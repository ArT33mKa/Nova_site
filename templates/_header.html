<!-- templates/_header.html (ВИПРАВЛЕНА ВЕРСІЯ) -->
<header class="main-header">
    <div class="container">
        <!-- Новий єдиний контейнер для всіх елементів хедера -->
        <div class="header-inner">

            <!-- 1. Логотип зліва -->
            <div class="logo">
                <a href="{{ url_for('index') }}" class="logo-link">
                    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Логотип Нова Хвиля" class="logo-image">
                    <div class="logo-text">
                        <h1>{{ shop.name }}</h1>
                        <p>Магазин сантехніки</p>
                    </div>
                </a>
            </div>

            <!-- 2. Навігація по центру -->
            <nav class="main-nav">
                <ul>
                    <li><a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' else '' }}">Головна</a></li>
                    <li><a href="{{ url_for('catalog') }}" class="{{ 'active' if request.endpoint == 'catalog' else '' }}">Каталог</a></li>
                    {% if current_user.is_authenticated and current_user.is_admin %}
                        <!-- [ВИПРАВЛЕНО] Додано "request.endpoint and" для уникнення помилки на сторінці 404 -->
                        <li class="admin-link"><a href="{{ url_for('admin_orders') }}" class="{{ 'active' if request.endpoint and 'admin_orders' in request.endpoint else '' }}">Замовлення</a></li>
                        <li class="admin-link"><a href="{{ url_for('admin_unfinished') }}" class="{{ 'active' if request.endpoint and 'admin_unfinished' in request.endpoint else '' }}">Незавершені</a></li>
                    {% endif %}
                    <li><a href="{{ url_for('index') }}#about">Про нас</a></li>
                    <li><a href="{{ url_for('index') }}#contacts">Контакти</a></li>
                </ul>
            </nav>

            <!-- 3. Дії користувача справа -->
            <div class="header-actions">
                {% if current_user.is_authenticated %}
                    <div class="user-cabinet-control" id="open-cabinet-modal">
                        <img src="{{ current_user.avatar_url or url_for('static', filename='img/default_avatar.png') }}" alt="Avatar" class="user-avatar">
                        <span>Кабінет</span>
                    </div>
                {% else %}
                    <button id="open-auth-modal-login" class="btn btn-outline">Увійти</button>
                    <button id="open-auth-modal-register" class="btn btn-primary">Реєстрація</button>
                {% endif %}

                <div class="action-icons">
                    <div id="open-favorites-btn" class="icon-wrapper" title="Обране">
                        <img src="{{ url_for('static', filename='img/favorite.png') }}" alt="Обране">
                        <span id="favorites-count" class="badge">0</span>
                    </div>
                    <div id="open-cart-btn" class="icon-wrapper" title="Кошик">
                        <img src="{{ url_for('static', filename='img/cart.png') }}" alt="Кошик">
                        <span id="cart-count" class="badge">0</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</header>
