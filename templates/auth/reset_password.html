{% extends "base.html" %}
{% block title %}Встановлення нового пароля{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; padding: 60px 0;">
    <h1 class="page-title">Встановіть новий пароль</h1>

    {% include '_review_flash_messages.html' %}

    <form method="POST" action="{{ url_for('reset_password', token=token) }}">
        <div class="form-group">
            <label for="password">Новий пароль</label>
            <input type="password" name="password" id="password" class="form-control" required minlength="6">
        </div>
        <div class="form-group">
            <label for="confirm_password">Підтвердіть новий пароль</label>
            <input type="password" name="confirm_password" id="confirm_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Змінити пароль</button>
    </form>
</div>
{% endblock %}
