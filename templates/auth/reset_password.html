{% extends "base.html" %}
{% block title %}Новий пароль{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; padding: 100px 20px;">
    <div class="profile-card">
        <h1 class="page-title text-center" style="border: none;">Новий пароль</h1>

        <form method="POST">
            <div class="form-group">
                <label>Придумайте новий пароль</label>
                <input type="password" name="password" class="form-control" required minlength="6">
            </div>
            <div class="form-group">
                <label>Підтвердіть пароль</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">Зберегти</button>
        </form>
    </div>
</div>
{% endblock %}
