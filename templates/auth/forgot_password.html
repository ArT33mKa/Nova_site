{% extends "base.html" %}
{% block title %}Відновлення пароля{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; padding: 60px 0;">
    <h1 class="page-title">Відновлення пароля</h1>
    <p style="color: var(--gray-color); margin-bottom: 20px;">Введіть email, пов'язаний з вашим акаунтом, і ми надішлемо вам інструкції для скидання пароля.</p>
    <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="form-group">
            <label for="email">Ваш Email</label>
            <input type="email" name="email" id="email" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Надіслати інструкції</button>
    </form>
</div>
{% endblock %}
