{% extends "base.html" %}
{% block title %}Додати товар{% endblock %}

{% block content %}
<div class="container" style="padding-top: 40px; padding-bottom: 60px; max-width: 700px;">
    <h1 class="page-title">Додати новий товар</h1>
    <form method="POST" class="checkout-form" style="display: block;">
        <div class="form-group">
            <label for="name">Назва товару</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="price">Ціна (в грн)</label>
            <input type="number" id="price" name="price" step="0.01" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="description">Опис</label>
            <textarea id="description" name="description" class="form-control" rows="5" required></textarea>
        </div>
        <div class="form-group">
            <label for="image">Назва файлу зображення (напр., `boiler.jpg`)</label>
            <input type="text" id="image" name="image" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="category_id">Оберіть існуючу категорію</label>
            <select id="category_id" name="category_id" class="form-control">
                <option value="">-- Не обрано --</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }} {% if cat.parent %} (у {{ cat.parent.name }}){% endif %}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group" style="margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 10px;">
            <label for="new_category_name">АБО створіть нову категорію</label>
            <input type="text" id="new_category_name" name="new_category_name" class="form-control" placeholder="Назва нової категорії">
            <small class="text-muted">Заповнюйте тільки якщо потрібної категорії немає у списку вище.</small>
        </div>
        <div class="form-group">
            <label class="checkbox-item">
                <input type="checkbox" name="in_stock" value="true" checked>
                В наявності
            </label>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Додати товар</button>
    </form>
</div>
{% endblock %}
