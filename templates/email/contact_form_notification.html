<!-- templates/email/contact_form_notification.html -->
<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .header { background-color: #f8f9fa; padding: 10px; border-bottom: 1px solid #ddd; }
        .content { padding: 20px; }
        .footer { margin-top: 20px; font-size: 0.8em; text-align: center; color: #888; }
        .field { margin-bottom: 10px; }
        .field strong { color: #0066cc; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h3>Нове повідомлення з сайту {{ shop.name }}</h3></div>
        <div class="content">
            <div class="field">
                <strong>Відправник:</strong> {{ data.name }}
            </div>
            <div class="field">
                <strong>Email:</strong> {{ data.email }}
            </div>
            <hr style="margin: 20px 0;">
            <p>{{ data.message }}</p>
        </div>
        <div class="footer">
            <p>Це автоматичне повідомлення з контактної форми сайту.</p>
        </div>
    </div>
</body>
</html>
