<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 12px; padding: 30px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { color: #0f172a; }
        p { color: #64748b; line-height: 1.6; }
        .btn { display: inline-block; background: #2563eb; color: white; padding: 12px 24px; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ласкаво просимо, {{ user.first_name }}! 👋</h1>
        <p>Дякуємо за реєстрацію в магазині <strong>{{ shop.name }}</strong>.</p>
        <p>Тепер ви можете:</p>
        <ul style="text-align: left; color: #334155; margin-bottom: 30px;">
            <li>🚀 Швидше оформлювати замовлення</li>
            <li>📦 Бачити історію покупок</li>
            <li>❤️ Зберігати товари в обране</li>
        </ul>
        <a href="{{ url_for('catalog', _external=True) }}" class="btn">Перейти до покупок</a>
    </div>
</body>
</html>
