<!-- templates/track_order.html (ОНОВЛЕНА ВЕРСІЯ) -->
{% extends "base.html" %}
{% block title %}Відстеження замовлення{% endblock %}

{% block content %}
<div class="container profile-page-container">
    <h1 class="page-title">Відстеження замовлення</h1>
    <p style="max-width: 600px; margin: -20px auto 30px auto; color: var(--gray-color); text-align: center;">
        Введіть номер телефону, який ви вказали при оформленні, щоб побачити ваші останні замовлення.
    </p>

    <div style="max-width: 500px; margin: 0 auto;">
        <!-- [ЗМІНЕНО] Форма тепер містить тільки поле для телефону -->
        <form id="trackOrderForm" class="profile-card" style="margin-bottom: 20px;">
            <div class="form-group">
                <label for="track_phone">Номер телефону</label>
                <input type="tel" id="track_phone" name="phone" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Знайти мої замовлення</button>
        </form>

        <!-- Блок для відображення результатів відстеження -->
        <div id="trackResult"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Ініціалізуємо маску для поля вводу телефону
    // Функція setupPhoneMaskAdvanced вже є у вашому файлі main.js
    if (typeof setupPhoneMaskAdvanced === 'function') {
        setupPhoneMaskAdvanced('#track_phone');
    }

    const trackForm = document.getElementById('trackOrderForm');
    const resultDiv = document.getElementById('trackResult');

    if (trackForm) {
        trackForm.addEventListener('submit', function(e) {
            e.preventDefault();
            resultDiv.innerHTML = `<p class="text-center" style="color: var(--gray-color);">Пошук замовлень...</p>`;

            const phone = document.getElementById('track_phone').value;

            fetch('/api/track_order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: phone })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success' && data.orders && data.orders.length > 0) {
                    // [ЗМІНЕНО] Генеруємо HTML для списку замовлень
                    let ordersHtml = '<h4>Знайдені замовлення:</h4>';
                    data.orders.forEach(order => {
                        ordersHtml += `
                            <div class="alert alert-success">
                                <p style="margin: 5px 0;"><strong>Замовлення:</strong> #${order.id}</p>
                                <p style="margin: 5px 0;"><strong>Статус:</strong> ${order.status}</p>
                                <p style="margin: 5px 0;"><strong>Дата:</strong> ${order.date}</p>
                                <p style="margin: 5px 0;"><strong>Сума:</strong> ${order.total.toFixed(2)} ₴</p>
                            </div>
                        `;
                    });
                    resultDiv.innerHTML = ordersHtml;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger">${data.message || 'Замовлень не знайдено.'}</div>`;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = `<div class="alert alert-danger">Сталася помилка зв'язку з сервером. Спробуйте пізніше.</div>`;
                console.error('Track order error:', error);
            });
        });
    }
});
</script>
{% endblock %}
