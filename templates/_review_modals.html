<div id="review-modal" class="modal">
    <div class="modal-content">
        <button class="close-modal">×</button>
        <h3>Написати відгук</h3>
        <form action="{{ url_for('add_review', product_id=product.id) }}" method="POST">
            <input type="hidden" name="review_type" value="review">

            <div class="form-group rating-input">
                <label>Ваша оцінка:</label>
                <div class="stars">
                    <input type="radio" id="star5" name="rating" value="5" required><label for="star5" title="Чудово">★</label>
                    <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="Добре">★</label>
                    <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="Нормально">★</label>
                    <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="Погано">★</label>
                    <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="Жахливо">★</label>
                </div>
            </div>

            <div class="form-group">
                <textarea name="text" placeholder="Напишіть ваш відгук тут..." rows="5" required></textarea>
            </div>

            {% if not current_user.is_authenticated %}
            <div class="form-group">
                <input type="text" name="author_name" placeholder="Ваше ім'я" required>
            </div>
            <div class="form-group">
                <input type="email" name="author_email" placeholder="Ваш Email (не буде опубліковано)">
            </div>
            {% endif %}

            <button type="submit" class="btn btn-primary btn-block">Відправити відгук</button>
        </form>
    </div>
</div>

<!-- Модальне вікно для питання -->

        <button class="close-modal">×</button>

<!-- Модальне вікно для відповіді на коментар -->
<div id="reply-modal" class="modal">
    <div class="modal-content">
        <button class="close-modal">×</button>
        <h3>Відповісти на коментар</h3>
        <form action="{{ url_for('add_review', product_id=product.id) }}" method="POST">
            <input type="hidden" name="review_type" value="reply">
            <input type="hidden" name="parent_id" id="reply-parent-id" value="">

            <div class="form-group">
                <textarea name="text" placeholder="Напишіть вашу відповідь тут..." rows="5" required></textarea>
            </div>

            {% if not current_user.is_authenticated %}
            <div class="form-group">
                <input type="text" name="author_name" placeholder="Ваше ім'я" required>
            </div>
            <div class="form-group">
                <input type="email" name="author_email" placeholder="Ваш Email (не буде опубліковано)">
            </div>
            {% endif %}

            <button type="submit" class="btn btn-primary btn-block">Відправити відповідь</button>
        </form>
    </div>
</div>
