<!-- 🏦 Оформлення замовлення -->
<div id="order-modal" class="modal hidden">
  <div class="modal-content">
    <h3>Оформлення замовлення</h3>
    <div id="order-summary"></div>
    <form id="orderForm">
      <input type="text" name="name" placeholder="Ваше  ім'я" required />
      <input type="tel" name="phone" placeholder="Номер телефону" required />
      <input type="text" name="address" placeholder="Адреса доставки" required />
      <button type="submit" class="btn">Підтвердити</button>
    </form>
    <button id="close-order-modal" class="btn danger">Закрити</button>
  </div>
</div>

<!-- 🎨 Модальне вікно кошика -->
<div id="cart-sidebar" class="cart-sidebar hidden">
  <div class="cart-sidebar-content">
    <h3 class="cart-title">Ваш кошик</h3>
    <ul id="cart-modal-items" class="cart-modal-items"></ul>
    <div class="cart-footer">
      <p id="cart-total"><strong>Разом:</strong> 0 грн</p>
      <button id="cart-checkout" class="btn">Оформити</button>
    </div>
    <button id="close-cart-sidebar" class="btn danger">Закрити</button>
  </div>
</div>

<!-- 🔐 Авторизація -->
<div id="auth-modal" class="modal hidden">
  <div class="modal-content auth-window">
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Вхід</button>
      <button class="tab-btn" data-tab="register">Реєстрація</button>
    </div>

    <div id="login" class="tab-content active">
      <form id="login-form">
        <input type="email" placeholder="Email" required />
        <input type="password" placeholder="Пароль" required />
        <button type="submit" class="btn">Увійти</button>
        <button type="button" class="btn google" id="google-login">
          <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" style="height:18px; margin-right:6px;">
          Увійти через Google
        </button>
      </form>
    </div>

    <div id="register" class="tab-content">
      <form id="register-form">
        <input type="text" placeholder="Ім'я" required />
        <input type="email" placeholder="Email" required />
        <input type="password" placeholder="Пароль" required />
        <button type="submit" class="btn">Зареєструватися</button>
      </form>
    </div>

    <button id="close-auth-modal" class="btn danger">Закрити</button>
  </div>
</div>

<!-- ✅ Toast повідомлення -->
<div id="toast" class="toast hidden">✅ Товар додано в кошик</div>

<!-- ℹ️ Модал інформації про товар -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>Інформація про товар</h3>
    <p id="modal-desc"></p>
    <button id="closeModal" class="btn">Закрити</button>
  </div>
</div>
