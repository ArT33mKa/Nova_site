{% extends "base.html" %}

{% block content %}
<section class="product-container">
  <div class="product-content">

    <!-- Ліва колонка: фото -->
    <div class="product-left">
      <div class="image-box">
        <img src="{{ url_for('static', filename='img/' ~ product.image) }}" alt="{{ product.name }}">
      </div>
    </div>


    <!-- Права колонка: інформація -->
    <div class="product-right">
      <h1 class="product-title">{{ product.name }}</h1>
      <div class="price">{{ product.price }} ₴</div>
      <button class="buy-button">Купити зараз</button>
      <div class="delivery-info">
        <p><strong>Доставка:</strong> Нова Пошта, 1–3 дні</p>
        <p><strong>Оплата:</strong> Готівка, карта, частинами</p>
      </div>
    </div>
  </div>

  <!-- Опис товару -->
  <div class="product-description">
    <h2>Характеристики та опис</h2>
    <p>{{ product.description }}</p>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  const product = document.querySelector('.product-detail-column');

  document.querySelector('.add-to-cart')?.addEventListener('click', () => {
    const id = +product.dataset.id;
    const name = product.dataset.name;
    const price = +product.dataset.price;
    const image = product.dataset.image?.split('/').pop();

    if (!id || !name || !price || !image) {
      alert('⛔️ Неможливо додати товар. Неправильні дані.');
      return;
    }

    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const existing = cart.find(i => i.id === id);
    existing ? existing.qty++ : cart.push({ id, name, price, image, qty: 1 });

    localStorage.setItem('cart', JSON.stringify(cart));

    const toast = document.getElementById('toast');
    toast.textContent = '✅ Товар додано';
    toast.classList.remove('hidden');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);

    const count = cart.reduce((sum, i) => sum + i.qty, 0);
    const badge = document.getElementById('cart-count');
    if (badge) badge.textContent = count;
  });
});
</script>
{% endblock %}
