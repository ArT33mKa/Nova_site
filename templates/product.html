{% extends 'base.html' %}
{% block content %}
<h2>{{ product.name }}</h2>
<img src="{{ url_for('static', filename='img/' ~ product.image) }}" alt="{{ product.name }}">
<p>{{ product.desc }}</p>
<p>Ціна: {{ product.price }} грн</p>
<button class="btn add-to-cart" data-id="{{ product.id }}" data-name="{{ product.name }}" data-price="{{ product.price }}">Додати в кошик</button>
{% endblock %}
