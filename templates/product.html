{% extends "base.html" %}

{% block content %}
<section class="container" style="margin-top: 2rem; text-align: center;">
  <div class="product-detail-column">
    <img src="{{ url_for('static', filename='img/' ~ product.image) }}"
         alt="{{ product.name }}"
         class="detail-img" />

    <h2>{{ product.name }}</h2>
    <p>{{ product.desc }}</p>
    <p><strong>{{ product.price }} грн</strong></p>

    <a href="{{ url_for('add_to_cart', product_id=product.id) }}" class="btn">Додати в кошик</a>
    <button class="btn" onclick="openOneClickOrder('{{ product.name }}', {{ product.price }})">Оформити</button>
  </div>
</section>

<script>
function openOneClickOrder(name, price) {
  document.getElementById('order-modal').classList.remove('hidden');
  document.getElementById('order-summary').innerHTML = `<p><strong>${name}</strong> — ${price} грн</p>`;
}
</script>
{% endblock %}
