<!-- templates/_review_flash_messages.html (НОВИЙ ФАЙЛ) -->
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category or 'info' }}">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}
{% endwith %}
