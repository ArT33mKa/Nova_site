<!-- templates/checkout.html (ПОВНІСТЮ ОНОВЛЕНА ВЕРСІЯ 2.0) -->
{% extends "base.html" %}
{% block title %}Оформлення замовлення{% endblock %}

{% block content %}
<div class="checkout-page-v2">
    <div class="container">
        <h1 class="page-title" style="text-align: left; border: none; padding-bottom: 20px;">Оформлення замовлення</h1>
        <form action="{{ url_for('checkout') }}" method="POST" class="checkout-grid-v2">
            <!-- Ліва колонка з даними -->
            <div>
                <section class="checkout-section">
                    <div class="checkout-section-header">
                        <span class="icon">1</span><h4>Контактні дані</h4>
                    </div>
                    <!-- [ЗМІНЕНО] Поля для імені та прізвища в один рядок -->
                    <div class="form-group-inline" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label for="customer_first_name">Ім'я</label>
                            <input type="text" name="customer_first_name" id="customer_first_name" required value="{% if current_user.is_authenticated %}{{ current_user.first_name }}{% endif %}" placeholder="Іван">
                        </div>
                        <div class="form-group">
                            <label for="customer_last_name">Прізвище</label>
                            <input type="text" name="customer_last_name" id="customer_last_name" required value="{% if current_user.is_authenticated %}{{ current_user.last_name or '' }}{% endif %}" placeholder="Іванов">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="customer_phone">Номер телефону</label>
                        <input type="tel" name="customer_phone" id="customer_phone" required>
                    </div>
                </section>

                <section class="checkout-section">
                    <div class="checkout-section-header">
                        <span class="icon">2</span><h4>Доставка</h4>
                    </div>
                    <div class="radio-group" id="delivery-method-group">
                        <label class="radio-option active">
                            <input type="radio" name="delivery_method" value="Самовивіз з магазину" checked>
                            <div>
                                <strong>Самовивіз з магазину</strong>
                                <p>Безкоштовно за адресою: {{ shop.city }}, {{ shop.address }}</p>
                            </div>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="delivery_method" value="Нова Пошта">
                             <div>
                                <strong>Нова Пошта</strong>
                                <p>Доставка у відділення або поштомат по Україні.</p>
                            </div>
                        </label>
                    </div>
                    <div id="nova-poshta-details" style="display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
                        <div class="form-group">
                            <label for="delivery_city">Населений пункт</label>
                            <input type="text" name="delivery_city" id="delivery_city" placeholder="Введіть назву міста чи села">
                        </div>
                        <div class="form-group">
                            <label for="delivery_warehouse">Відділення або поштомат</label>
                            <select name="delivery_warehouse" id="delivery_warehouse" disabled>
                                <option value="">Спочатку виберіть населений пункт</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="checkout-section">
                    <div class="checkout-section-header">
                        <span class="icon">3</span><h4>Оплата</h4>
                    </div>
                    <div class="radio-group">
                        <label class="radio-option active">
                            <input type="radio" name="payment_method" value="Післяплата" checked>
                            <div>
                                <strong>Післяплата (при отриманні)</strong>
                                <p>Оплата готівкою або карткою у відділенні "Нової Пошти".</p>
                            </div>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="payment_method" value="Оплата на рахунок">
                             <div>
                                <strong>Оплата на рахунок</strong>
                                <p>Реквізити для оплати будуть надіслані після підтвердження замовлення.</p>
                            </div>
                        </label>
                    </div>
                </section>
            </div>

            <!-- Права колонка з підсумком замовлення -->
            <aside class="order-summary-v2">
                <section class="checkout-section">
                    <h4>Ваше замовлення</h4>
                    <div id="summary-item-list"></div>
                    <div class="summary-totals">
                        <div class="summary-total-row">
                            <span>Вартість товарів:</span>
                            <span id="summary-subtotal">...</span>
                        </div>
                        <div class="summary-total-row">
                            <span>Доставка:</span>
                            <span>За тарифами</span>
                        </div>
                        <div class="summary-total-row grand-total">
                            <span>Разом до сплати:</span>
                            <span id="summary-grand-total">...</span>
                        </div>
                    </div>
                     <button type="submit" class="btn btn-primary btn-block btn-lg">Підтвердити замовлення</button>
                </section>
            </aside>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // --- ОСНОВНА ЛОГІКА СТОРІНКИ ---
    setupRadioGroups();
    loadCartSummary();
    setupDeliveryLogic();
    // [ЗМІНЕНО] Викликаємо нову функцію для маски
    setupPhoneMaskAdvanced();

    // --- ФУНКЦІЇ ---

    const form = document.querySelector('.checkout-grid-v2');
    form.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
            e.preventDefault();
            const inputs = Array.from(form.querySelectorAll('input, select'));
            const currentIndex = inputs.indexOf(e.target);
            const nextInput = inputs[currentIndex + 1];
            if (nextInput) {
                nextInput.focus();
            } else {
                form.querySelector('button[type="submit"]').focus();
            }
        }
    });

    function setupRadioGroups() {
        // ... (код без змін)
        document.querySelectorAll('.radio-group').forEach(group => {
            group.addEventListener('click', e => {
                const label = e.target.closest('.radio-option');
                if (!label) return;
                group.querySelectorAll('.radio-option').forEach(opt => opt.classList.remove('active'));
                label.classList.add('active');
                label.querySelector('input').checked = true;
                if (group.id === 'delivery-method-group') {
                    const event = new Event('deliveryChange');
                    group.dispatchEvent(event);
                }
            });
        });
    }

    function loadCartSummary() {
        // ... (код без змін)
        fetch('/get_cart')
            .then(res => res.json())
            .then(data => {
                const listContainer = document.getElementById('summary-item-list');
                const subtotalEl = document.getElementById('summary-subtotal');
                const grandTotalEl = document.getElementById('summary-grand-total');

                listContainer.innerHTML = '';
                if (data.items.length > 0) {
                    data.items.forEach(item => {
                        const itemHtml = `
                            <div class="summary-item">
                                <img src="${item.image}" alt="${item.name}">
                                <div class="summary-item-details">
                                    <div class="name">${item.name}</div>
                                    <div class="price">${item.quantity} x ${item.price.toFixed(2)} ₴</div>
                                </div>
                            </div>`;
                        listContainer.insertAdjacentHTML('beforeend', itemHtml);
                    });
                }
                subtotalEl.textContent = `${data.total.toFixed(2)} ₴`;
                grandTotalEl.textContent = `${data.total.toFixed(2)} ₴`;
            });
    }

    function setupDeliveryLogic() {
        // ... (код без змін)
        const deliveryGroup = document.getElementById('delivery-method-group');
        const novaPoshtaDetails = document.getElementById('nova-poshta-details');
        const cityInput = document.getElementById('delivery_city');
        const warehouseSelect = document.getElementById('delivery_warehouse');

        deliveryGroup.addEventListener('deliveryChange', () => {
            const selectedMethod = document.querySelector('input[name="delivery_method"]:checked').value;
            novaPoshtaDetails.style.display = selectedMethod === 'Нова Пошта' ? 'block' : 'none';
            cityInput.required = selectedMethod === 'Нова Пошта';
            warehouseSelect.required = selectedMethod === 'Нова Пошта';
        });

        cityInput.addEventListener('input', function() {
            const cityName = this.value.trim();
            if (cityName.length > 2) {
                fetchWarehouses(cityName);
            } else {
                warehouseSelect.innerHTML = '<option value="">Введіть назву населеного пункту</option>';
                warehouseSelect.disabled = true;
            }
        });

        function fetchWarehouses(city) {
             warehouseSelect.disabled = true;
            warehouseSelect.innerHTML = '<option value="">Завантаження...</option>';
            setTimeout(() => {
                const warehousesByCity = { "Київ": ["Відділення №1", "Відділення №10"], "Миргород": ["Відділення №1", "Відділення №2"] };
                let cityWarehouses = [];
                for (const key in warehousesByCity) {
                    if (key.toLowerCase().startsWith(city.toLowerCase())) {
                        cityWarehouses = warehousesByCity[key];
                        break;
                    }
                }
                if (cityWarehouses.length > 0) {
                    warehouseSelect.innerHTML = '<option value="">-- Оберіть відділення --</option>';
                    cityWarehouses.forEach(wh => warehouseSelect.add(new Option(wh, wh)));
                    warehouseSelect.disabled = false;
                } else {
                    warehouseSelect.innerHTML = '<option value="">Відділення не знайдені</option>';
                }
            }, 500);
        }
    }

    // [НОВА ФУНКЦІЯ] Повністю переписана логіка для маски телефону
    function setupPhoneMaskAdvanced() {
        const phoneInput = document.getElementById('customer_phone');
        const matrix = "+380 (__) ___-__-__";

        // Функція для встановлення позиції курсора
        const setCursorPosition = (pos, elem) => {
            elem.focus();
            if (elem.setSelectionRange) {
                elem.setSelectionRange(pos, pos);
            } else if (elem.createTextRange) {
                const range = elem.createTextRange();
                range.collapse(true);
                range.moveEnd("character", pos);
                range.moveStart("character", pos);
                range.select();
            }
        };

        const mask = (event) => {
            let i = 0;
            const def = matrix.replace(/\D/g, "");
            let val = event.target.value.replace(/\D/g, "");

            // Забороняємо стирати префікс +380
            if (val.length < def.length) {
                val = def;
            }

            let newValue = matrix.replace(/[_\d]/g, (a) => {
                return i < val.length ? val.charAt(i++) : a;
            });

            // Знаходимо першу позицію для введення
            i = newValue.indexOf("_");
            if (i !== -1) {
                // Видаляємо все після першого "_"
                newValue = newValue.slice(0, i);
            }

            // Якщо користувач натиснув не цифру, і це не backspace/delete, ігноруємо
            const reg = new RegExp("^" + matrix.replace(/_/g, "\\d").replace(/\(/g, "\\(").replace(/\)/g, "\\)").replace(/\+/g, "\\+") + "$");
            if (!reg.test(event.target.value) || event.target.value.length < 5 || (event.keyCode > 47 && event.keyCode < 58) ) {
                event.target.value = newValue;
            }

            // Встановлюємо правильний колір
            if (event.target.value.length <= 5) {
                event.target.style.color = 'var(--gray-color)';
            } else {
                event.target.style.color = 'var(--dark-color)';
            }
        };

        phoneInput.addEventListener("input", mask, false);
        phoneInput.addEventListener("focus", mask, false);
        phoneInput.addEventListener("blur", mask, false);
        phoneInput.addEventListener("keydown", mask, false);
        phoneInput.addEventListener("click", (event) => {
            // При кліку завжди ставимо курсор на перше вільне місце
            let i = event.target.value.indexOf("_");
            if(i != -1) {
                setCursorPosition(i, event.target);
            }
        }, false);

        // Початковий стан
        phoneInput.value = matrix;
        phoneInput.style.color = 'var(--gray-color)';
    }
});
</script>
{% endblock %}
