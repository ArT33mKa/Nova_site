<!-- templates/_product_card.html (ОСТАТОЧНА ВЕРСІЯ) -->
<div class="product-card" data-id="{{ product.id }}">

    <div class="product-image">
        <!-- Посилання, що огортає зображення -->
        <a href="{{ url_for('product_detail', product_id=product.id) }}" class="product-image-link">
            <img src="{{ url_for('static', filename='img/products/' + product.image) }}" alt="{{ product.name }}">
        </a>

        <!-- Статус наявності (зверху зліва) -->
        {% if product.in_stock %}
            <div class="stock-status in-stock">Є в наявності</div>
        {% else %}
            <div class="stock-status out-of-stock">Немає в наявності</div>
        {% endif %}

        <!-- Кнопка "Обране" (зверху справа) -->
        <button class="favorite-btn" title="Додати в обране">
            <i class="fas fa-star"></i>
        </button>

        <!-- Блок з адмін-кнопками (позиціонується відносно .product-image) -->
        {% if current_user.is_authenticated and current_user.is_admin %}
        <div class="admin-product-actions">
            <a href="{{ url_for('edit_product', product_id=product.id) }}" class="admin-action-btn edit-btn" title="Редагувати">
                <i class="fas fa-pencil-alt"></i>
            </a>
            <form action="{{ url_for('delete_product', product_id=product.id) }}" method="POST" onsubmit="return confirm('Ви впевнені, що хочете видалити цей товар?');">
                <button type="submit" class="admin-action-btn delete-btn" title="Видалити">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </form>
        </div>
        {% endif %}
    </div>

    <!-- Інформація про товар -->
    <div class="product-info">
        <h3><a href="{{ url_for('product_detail', product_id=product.id) }}">{{ product.name }}</a></h3>
        <div class="product-footer">
            <span class="price">{{ "%.2f"|format(product.price) }} ₴</span>
            <button class="btn btn-sm add-to-cart-btn" data-id="{{ product.id }}" {% if not product.in_stock %}disabled{% endif %}>
                Додати в кошик
            </button>
        </div>
    </div>
</div>
