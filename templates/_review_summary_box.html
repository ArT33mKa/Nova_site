<!-- templates/_review_summary_box.html (НОВИЙ ФАЙЛ) -->
<div class="summary-box">
    <div class="overall-rating text-center">
        <div class="rating-value">{{ "%.1f"|format(product.rating) }}</div>
        <div class="stars-outer" style="font-size: 1.5em; margin: 5px 0;">
            <div class="stars-inner" style="width: {{ (product.rating / 5) * 100 }}%"></div>
        </div>
        <div class="reviews-count">{{ review_only_count }} відгуків</div>
    </div>
    <div class="rating-breakdown">
        {% for star, count in rating_breakdown.items() %}
        <div class="breakdown-row">
            <span>{{ star }} ★</span>
            <div class="bar-container"><div class="bar" style="width: {{ (count * 100 / (total_reviews_with_rating or 1))|int }}%;"></div></div>
            <span>{{ count }}</span>
        </div>
        {% endfor %}
    </div>
    <div style="margin-top: 30px;">
        <button id="open-review-modal-btn" class="btn btn-primary btn-block">Написати відгук</button>
        <button id="open-question-modal-btn" class="btn btn-outline btn-block" style="margin-top:10px">Поставити питання</button>
    </div>
</div>
