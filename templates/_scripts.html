<script>
document.addEventListener('DOMContentLoaded', () => {
  const cartIcon        = document.getElementById('cart-icon');
  const cartCountBadge  = document.getElementById('cart-count');
  const cartSidebar     = document.getElementById('cart-sidebar');
  const cartItemsUl     = document.getElementById('cart-modal-items');
  const cartTotalEl     = document.getElementById('cart-total');
  const cartCheckoutBtn = document.getElementById('cart-checkout');
  const closeCartSidebar = document.getElementById('close-cart-sidebar');
  const toast           = document.getElementById('toast');
  const productList     = document.getElementById('productList');
  const favoritesCount  = document.getElementById('favorites-count');
  const favoritesIcon   = document.getElementById('favorites-icon');
  const favoritesList   = document.getElementById('favorites-list');

  let cart = [];
  let favorites = [];

  // 🛒 Завантаження кошика з localStorage
  try {
    const sessionCart = JSON.parse(localStorage.getItem('cart')) || [];
    const sessionFavs = JSON.parse(localStorage.getItem('favorites')) || [];
    cart = Array.isArray(sessionCart) ? sessionCart : [];
    favorites = Array.isArray(sessionFavs) ? sessionFavs : [];
  } catch (err) {
    cart = [];
    favorites = [];
  }

  updateBadge();
  updateFavoritesUI();

  // 🛒 Додавання в кошик
  document.body.addEventListener('click', e => {
    const productEl = e.target.closest('.product');
    if (!productEl) return;

    if (e.target.classList.contains('add-to-cart')) {
      const id = +productEl.dataset.id;
      const name = productEl.dataset.name || productEl.querySelector('h4')?.innerText;
      const price = +productEl.dataset.price || +productEl.querySelector('p')?.innerText.replace(/[^\d]/g, '');
      const image = (productEl.dataset.image || productEl.querySelector('img')?.src || '').split('/').pop();

      if (!id || !name || !price || !image) {
        showToast("⛔️ Помилка даних товару");
        return;
      }

      const existing = cart.find(i => i.id === id);
      existing ? existing.qty++ : cart.push({ id, name, price, image, qty: 1 });

      persistCart();
      renderCart();
      showToast('✅ Товар додано');
    }

    if (e.target.classList.contains('favorite-icon')) {
      const id = +productEl.dataset.id;
      const name = productEl.querySelector('h4')?.innerText;
      const price = +productEl.querySelector('p')?.innerText.replace(/[^\d]/g, '');
      const image = productEl.querySelector('img')?.src;
      const url = productEl.dataset.url;

      const existing = favorites.find(p => p.id === id);
      if (existing) {
        favorites = favorites.filter(p => p.id !== id);
      } else {
        favorites.unshift({ id, name, price, image, url });
      }

      localStorage.setItem('favorites', JSON.stringify(favorites));
      updateFavoritesUI();
      showToast(existing ? "⭐ Видалено з обраного" : "⭐ Додано до обраного");
    }
  });

  // 🛒 Відкриття/закриття кошика
  cartIcon?.addEventListener('click', () => {
    cartSidebar.classList.toggle('show');
    if (cartSidebar.classList.contains('show')) renderCart();
  });

  closeCartSidebar?.addEventListener('click', () => {
    cartSidebar.classList.remove('show');
  });

  cartCheckoutBtn?.addEventListener('click', () => {
    if (!cart.length) return alert('Кошик порожній');
    showToast('✅ Переходимо до оформлення...');
  });

  cartItemsUl?.addEventListener('click', e => {
    const idx = +e.target.dataset.idx;
    if (isNaN(idx)) return;

    if (e.target.classList.contains('plus')) cart[idx].qty++;
    else if (e.target.classList.contains('minus')) cart[idx].qty > 1 ? cart[idx].qty-- : cart.splice(idx, 1);
    else if (e.target.classList.contains('remove-item')) cart.splice(idx, 1);

    persistCart();
    renderCart();
  });

  // 🔐 Авторизація
  document.getElementById('open-auth-modal')?.addEventListener('click', () => {
    document.getElementById('auth-modal')?.classList.remove('hidden');
  });

  document.getElementById('close-auth-modal')?.addEventListener('click', () => {
    document.getElementById('auth-modal')?.classList.add('hidden');
  });

  // 🟢 Увійти через Google
  document.getElementById('google-login')?.addEventListener('click', () => {
    window.location.href = "/login/google";
  });


  // ✉️ Контактна форма
  const contactForm = document.getElementById("contactForm");
  if (contactForm) {
    contactForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(contactForm);
      try {
        const res = await fetch("/send_message", { method: "POST", body: formData });
        const data = await res.json();
        showToast(data.message);
        if (data.status === "success") contactForm.reset();
      } catch (err) {
        showToast("❌ Сталася помилка. Спробуйте ще раз.");
      }
    });
  }

  // 🟢 Рендеринг
  function renderCart() {
    cartItemsUl.innerHTML = '';
    if (!cart.length) {
      cartItemsUl.innerHTML = '<li class="empty">Кошик порожній</li>';
      cartTotalEl.innerHTML = '<strong>Разом:</strong> 0 грн';
      return;
    }

    cart.forEach((item, idx) => {
      const li = document.createElement('li');
      li.className = 'cart-item';
      li.innerHTML = `
        <img src="/static/img/${item.image}" alt="${item.name}">
        <div class="item-info">
          <h4>${item.name}</h4>
          <p>${item.price} грн · <span style="color:green">в наявності</span></p>
        </div>
        <div class="qty-controls">
          <button class="qty-btn minus" data-idx="${idx}">−</button>
          <span class="qty">${item.qty}</span>
          <button class="qty-btn plus" data-idx="${idx}">+</button>
        </div>
        <button class="remove-item" data-idx="${idx}">🗑️</button>
      `;
      cartItemsUl.appendChild(li);
    });

    updateTotal();
  }

  function updateBadge() {
    const count = cart.reduce((sum, i) => sum + i.qty, 0);
    cartCountBadge.textContent = count;
  }

  function updateTotal() {
    const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
    cartTotalEl.innerHTML = `<strong>Разом:</strong> ${total} грн`;
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.remove('hidden');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function persistCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
    updateBadge();
  }

  function updateFavoritesUI() {
    const icons = document.querySelectorAll('.favorite-icon');
    const ids = favorites.map(f => f.id);
    icons.forEach(icon => {
      const id = +icon.closest('.product')?.dataset.id;
      if (!id) return;
      icon.textContent = ids.includes(id) ? '★' : '☆';
      icon.classList.toggle('active', ids.includes(id));
    });
    if (favoritesCount) favoritesCount.textContent = favorites.length;
  }
});
    // Додавання до кошика зі сторінки одного товару
  const productDetail = document.querySelector('.product-detail-column');
  if (productDetail) {
    const addBtn = productDetail.querySelector('.add-to-cart');
    addBtn?.addEventListener('click', () => {
      const id = +productDetail.dataset.id;
      const name = productDetail.dataset.name;
      const price = +productDetail.dataset.price;
      const image = productDetail.dataset.image?.split('/').pop();

      if (!id || !name || !price || !image) {
        showToast("⛔️ Дані товару неповні");
        return;
      }

      const existing = cart.find(i => i.id === id);
      existing ? existing.qty++ : cart.push({ id, name, price, image, qty: 1 });

      persistCart();
      renderCart?.();
      showToast('✅ Товар додано в кошик');
    });
  }


</script>
